name: Set up Rust
description: Checkout, install a Rust toolchain (dtolnay/rust-toolchain), and enable the shared build cache.
inputs:
  toolchain:
    description: Toolchain to install (e.g. stable, nightly, beta, 1.92.0).
    required: false
    default: stable
  components:
    description: Comma-separated rustup components (e.g. clippy, rustfmt, miri).
    required: false
    default: ""
  targets:
    description: Comma-separated target triples to add.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - uses: actions/checkout@v7
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}
    - uses: Swatinem/rust-cache@v2
