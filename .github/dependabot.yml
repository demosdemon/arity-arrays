version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Bundle every action bump into one PR per week instead of a PR per action.
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    # One grouped PR per week for the whole Cargo workspace, mirroring actions above.
    groups:
      cargo:
        patterns:
          - "*"
