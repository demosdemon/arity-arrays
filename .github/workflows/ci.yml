name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
          components: rustfmt
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just fmt-check

  lint:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just lint

  nostd:
    name: no_std bare-metal build
    needs: [fmt, lint]
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust
        with:
          targets: thumbv7em-none-eabihf
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just nostd

  docs:
    needs: [fmt, lint]
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just doc

  features:
    # Feature gating is platform-agnostic (no target_os/arch cfg in the library
    # crates), so the cargo-hack feature powerset runs on Linux only; platform
    # breadth lives in the `test` and `bench` jobs. The recipe is the source of
    # truth for the exact powerset. beta is omitted here (it never diverges from
    # stable for feature gating) but kept in `test`.
    name: feature powerset / ${{ matrix.toolchain }}
    needs: [nostd, docs]
    runs-on: ubuntu-26.04
    strategy:
      fail-fast: true
      matrix:
        toolchain: [msrv, stable, nightly]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-hack
      - run: just features

  test:
    name: test ${{ matrix.os }} / ${{ matrix.toolchain }}
    needs: [features]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025-vs2026, macos-26, ubuntu-26.04, ubuntu-26.04-arm]
        toolchain:
          - msrv
          - stable
          - beta
          - nightly
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-nextest
      - run: just ci-test ${{ matrix.toolchain }}

  # Per-PR Miri smoke: the shared reusable workflow (miri.yml) at a reduced
  # proptest depth. Miri interprets ~100s per proptest case across these
  # binaries, so the full 256-case spread is ~7h — over GitHub's 6h job limit.
  # Keep PR/merge feedback fast here; the sharded daily run in miri-full.yml
  # covers the full 256-case spread.
  miri:
    needs: [test]
    uses: ./.github/workflows/miri.yml
    with:
      proptest-cases: "8"
      timeout-minutes: 30

  fuzz:
    needs: [test]
    runs-on: ubuntu-26.04
    strategy:
      # One target's crash must not cancel the others.
      fail-fast: false
      matrix:
        target:
          - mutation_8
          - mutation_16
          - mutation_32
          - mutation_64
          - mutation_128
          - mutation_256
          - gapped_8
          - gapped_16
          - gapped_32
          - gapped_64
          - gapped_128
          - gapped_256
          - compact_decode
          - bitmap_roundtrip
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
      # Install a prebuilt cargo-fuzz instead of compiling it from source.
      # taiki-e/install-action verifies the binary is actually present each run,
      # so it is not fooled by the cargo install ledger (.crates2.json) that
      # rust-cache round-trips while cleaning the binary out of ~/.cargo/bin.
      - uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-fuzz
      # Persist + grow each target's corpus across runs so later runs explore
      # deeper. Keyed per target so corpora do not collide.
      - uses: actions/cache@v6
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: fuzz-corpus-${{ matrix.target }}-
      # Smoke-level fuzzing: a fixed wall-clock budget catches regressions
      # without unbounded CI cost. Deeper soaks run out-of-band. The gnu target
      # pin and its rationale live in the ci-fuzz recipe.
      - run: just ci-fuzz ${{ matrix.target }}

  bench:
    name: bench ${{ matrix.os }}
    needs: [test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025-vs2026, macos-26, ubuntu-26.04, ubuntu-26.04-arm]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      # Pull requests run quick benches (assert they execute on every platform
      # without paying for full-precision sampling); merges to main run the full
      # suite.
      - run: just ci-bench ${{ github.event_name == 'pull_request' && '--quick' || '' }}
