name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-26.04
    steps:
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
          components: rustfmt
      - run: cargo fmt --all --check

  lint:
    runs-on: ubuntu-26.04
    steps:
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  nostd:
    name: no_std bare-metal build
    needs: [fmt, lint]
    runs-on: ubuntu-26.04
    steps:
      - uses: ./.github/actions/setup-rust
        with:
          targets: thumbv7em-none-eabihf
      # A no_std target (no std in the sysroot) fails to build if any dep or
      # feature transitively pulls std — locking the #![no_std] discipline now
      # that std-capable optional deps (serde, serde_with) exist.
      - run: cargo build -p arity-arrays --no-default-features --features "16,serde" --target thumbv7em-none-eabihf

  docs:
    needs: [fmt, lint]
    runs-on: ubuntu-26.04
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: ./.github/actions/setup-rust
      - run: cargo doc --workspace --no-deps --all-features

  features:
    name: feature matrix ${{ matrix.os }} / ${{ matrix.toolchain }} / ${{ matrix.features }}
    needs: [nostd, docs]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [windows-2025-vs2026, macos-26, ubuntu-26.04, ubuntu-26.04-arm]
        toolchain:
          - "1.92.0" # MSRV
          - stable
          - beta
          - nightly
        features:
          # Lean single-arity build (the firewood shape): library compiles and lints clean.
          - "16"
          # Arity-256 alone: exercises the U256 backing in isolation.
          - "256"
          # No arities selected: the crates still compile (empty of arity types), warning-free.
          - ""
          # Logical serde without serde_with (catches a misplaced serde_with cfg).
          - "16,serde"
          # ethnum backing + compact serde + std together.
          - "256,ethnum,serde_with,std"
    steps:
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
      - run: cargo clippy --workspace --no-default-features --features "${{ matrix.features }}" -- -D warnings

  test:
    name: test ${{ matrix.os }} / ${{ matrix.toolchain }}
    needs: [features]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025-vs2026, macos-26, ubuntu-26.04, ubuntu-26.04-arm]
        toolchain:
          - "1.92.0" # MSRV
          - stable
          - beta
          - nightly
    steps:
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ matrix.toolchain }}
      - run: cargo test --workspace --all-features --all-targets
      - run: cargo test --workspace --all-features --doc
      # Default features (= the custom two-limb U256 backing): fast runtime
      # coverage of the shipping default, which --all-features swaps to ethnum.
      - run: cargo test --workspace

  # Per-PR Miri smoke: the shared reusable workflow (miri.yml) at a reduced
  # proptest depth. Miri interprets ~100s per proptest case across these
  # binaries, so the full 256-case spread is ~7h — over GitHub's 6h job limit.
  # Keep PR/merge feedback fast here; the sharded daily run in miri-full.yml
  # covers the full 256-case spread.
  miri:
    needs: [test]
    uses: ./.github/workflows/miri.yml
    with:
      proptest-cases: "8"
      timeout-minutes: 30

  fuzz:
    needs: [test]
    runs-on: ubuntu-26.04
    strategy:
      # One target's crash must not cancel the others.
      fail-fast: false
      matrix:
        target:
          - mutation_8
          - mutation_16
          - mutation_32
          - mutation_64
          - mutation_128
          - mutation_256
          - compact_decode
          - bitmap_roundtrip
    steps:
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
      # Install a prebuilt cargo-fuzz instead of compiling it from source.
      # taiki-e/install-action verifies the binary is actually present each run,
      # so it is not fooled by the cargo install ledger (.crates2.json) that
      # rust-cache round-trips while cleaning the binary out of ~/.cargo/bin.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      # Persist + grow each target's corpus across runs so later runs explore
      # deeper. Keyed per target so corpora do not collide.
      - uses: actions/cache@v6
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: fuzz-corpus-${{ matrix.target }}-
      # Smoke-level fuzzing: a fixed wall-clock budget catches regressions
      # without unbounded CI cost. Deeper soaks run out-of-band.
      #
      # Pin --target to the gnu host triple. cargo-fuzz defaults --target to the
      # triple it was *built* for (a compile-time constant), and the prebuilt
      # binstall binary is musl. Without this, the fuzz target builds for
      # x86_64-unknown-linux-musl, where ASAN cannot link against static musl
      # libc and the musl std is not installed.
      - run: cargo +nightly fuzz run ${{ matrix.target }} --target x86_64-unknown-linux-gnu -- -max_total_time=60 -rss_limit_mb=4096

  bench:
    name: bench ${{ matrix.os }} / ${{ matrix.toolchain }}
    needs: [test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025-vs2026, macos-26, ubuntu-26.04, ubuntu-26.04-arm]
        toolchain:
          - "1.92.0" # MSRV
          - stable
          - beta
          - nightly
    steps:
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ matrix.toolchain }}
      - run: cargo build --workspace --all-features --benches
      - run: cargo bench --workspace --all-features
