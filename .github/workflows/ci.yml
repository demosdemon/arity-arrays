name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test ${{ matrix.os }} / ${{ matrix.toolchain }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025-vs2026, macos-26, ubuntu-26.04, ubuntu-26.04-arm]
        toolchain: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features --all-targets
      - run: cargo test --workspace --all-features --doc
      # Default features (= the custom two-limb U256 backing): fast runtime
      # coverage of the shipping default, which --all-features swaps to ethnum.
      - run: cargo test --workspace

  lint:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo +nightly fmt --all --check
      - run: cargo +stable clippy --workspace --all-targets --all-features -- -D warnings

  features:
    name: feature matrix
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Lean single-arity build (the firewood shape): library compiles and lints clean.
      - run: cargo clippy --workspace --no-default-features --features 16 -- -D warnings
      # Arity-256 alone: exercises the U256 backing in isolation.
      - run: cargo clippy --workspace --no-default-features --features 256 -- -D warnings
      # No arities selected: the crates still compile (empty of arity types), warning-free.
      - run: cargo clippy --workspace --no-default-features -- -D warnings
      # Logical serde without serde_with (catches a misplaced serde_with cfg).
      - run: cargo clippy --workspace --no-default-features --features "16,serde" -- -D warnings
      # ethnum backing + compact serde + std together.
      - run: cargo clippy --workspace --no-default-features --features "256,ethnum,serde_with,std" -- -D warnings

  nostd:
    name: no_std bare-metal build
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
      # A no_std target (no std in the sysroot) fails to build if any dep or
      # feature transitively pulls std — locking the #![no_std] discipline now
      # that std-capable optional deps (serde, serde_with) exist.
      - run: cargo build -p arity-arrays --no-default-features --features "16,serde" --target thumbv7em-none-eabihf

  miri:
    runs-on: ubuntu-26.04
    # disable-isolation: the round-trip proptests read/write their regression
    # files on disk and seed from host entropy; strict-provenance stays on.
    env:
      MIRIFLAGS: "-Zmiri-strict-provenance -Zmiri-disable-isolation"
      PROPTEST_CASES: "32"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - run: cargo +nightly miri test --workspace --tests

  fuzz:
    runs-on: ubuntu-26.04
    # Don't burn a 60s fuzzer run on a tree the basic tests already reject.
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      # Install a prebuilt cargo-fuzz instead of compiling it (and the local-dev
      # tools the fuzz job never uses) from source.
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall --no-confirm cargo-fuzz
      # Persist + grow the corpus across runs so later runs explore deeper.
      - uses: actions/cache@v4
        with:
          path: fuzz/corpus/packed_ops
          key: fuzz-corpus-packed_ops-${{ github.run_id }}
          restore-keys: fuzz-corpus-packed_ops-
      # Smoke-level fuzzing: a fixed wall-clock budget catches regressions
      # without unbounded CI cost. Deeper soaks run out-of-band.
      - run: cargo +nightly fuzz run packed_ops -- -max_total_time=60 -rss_limit_mb=4096

  msrv:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-features
      - run: cargo test --workspace --all-features

  docs:
    runs-on: ubuntu-26.04
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features
