name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test ${{ matrix.os }} / ${{ matrix.toolchain }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025-vs2026, macos-26, ubuntu-26.04, ubuntu-26.04-arm]
        toolchain: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features --all-targets
      - run: cargo test --workspace --all-features --doc

  lint:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo +nightly fmt --all --check
      - run: cargo +stable clippy --workspace --all-targets --all-features -- -D warnings

  features:
    name: feature matrix
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Lean single-arity build (the firewood shape): library compiles and lints clean.
      - run: cargo clippy --workspace --no-default-features --features 16 -- -D warnings
      # Arity-256 alone: exercises the U256 backing in isolation.
      - run: cargo clippy --workspace --no-default-features --features 256 -- -D warnings
      # No arities selected: the crates still compile (empty of arity types), warning-free.
      - run: cargo clippy --workspace --no-default-features -- -D warnings

  miri:
    runs-on: ubuntu-26.04
    # disable-isolation: the round-trip proptests read/write their regression
    # files on disk and seed from host entropy; strict-provenance stays on.
    env:
      MIRIFLAGS: "-Zmiri-strict-provenance -Zmiri-disable-isolation"
      PROPTEST_CASES: "32"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - run: cargo +nightly miri test --workspace --tests

  msrv:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.92.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-features
      - run: cargo test --workspace --all-features

  docs:
    runs-on: ubuntu-26.04
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features
