name: Bench compare

# Reusable A/B benchmark comparison, shared by the trigger-specific callers
# (bench-compare-pr.yml, bench-compare-dispatch.yml, bench-compare-push.yml,
# bench-compare-comment.yml). Runs base/head single-pass on quick runs, or
# base/head/head/base (interleaved A/B/B/A) on full-precision runs, on one
# runner so both captures share the same hardware/thermal noise floor, diffs
# them via `xtask compare`, and always publishes to the job summary (plus a
# sticky PR comment when the caller asks for one). No `permissions:` block
# here — the reusable workflow inherits whatever the calling job grants,
# mirroring miri.yml.
#
# The base/head capture steps intentionally never invoke `just`/`xtask` — only
# `cargo`/`cargo-criterion` directly. Those repo-tracked tools may not exist yet
# at an older base-ref (notably the very first comparison run after this
# workflow is added). `xtask` is built once up front from THIS workflow's ref
# (before any capture checks out another ref) and stashed, so `Render
# comparison` runs a tool whose CLI matches this workflow's invocation. Under
# pull_request_target the workflow definition comes from the base branch, so a
# tool built from the PR head — which may have changed the xtask CLI — would be
# invoked with the wrong arguments; building from the workflow's own ref avoids
# that skew.
on:
  workflow_call:
    inputs:
      base-ref:
        description: Git ref/SHA to treat as "before".
        type: string
        required: true
      head-ref:
        description: Git ref/SHA to treat as "after".
        type: string
        required: true
      quick:
        description: >-
          Reduce sample count/timing for a faster, noisier comparison. Passed
          to the bench harness via BENCH_QUICK, not a Criterion CLI flag:
          cargo-criterion (needed for --message-format=json) does not forward
          --quick, --sample-size, or any other criterion CLI flag to the
          harness the way plain `cargo bench` does, and criterion.toml has no
          sample-size knob either — so the harness itself (benches/throughput.rs,
          benches/trie.rs) reads this env var directly.
        type: boolean
        required: true
      post-comment:
        description: Whether to upsert a sticky PR comment.
        type: boolean
        required: true
      pr-number:
        description: >-
          PR head-ref belongs to, when it may be a fork commit. Required when
          post-comment is true or head-ref is a fork commit not otherwise
          reachable in this repository. Typed string, not number: a
          workflow_dispatch string input forwarded by expression into a
          number-typed workflow_call input fails Actions' template validation
          (actions/runner#2848).
        type: string
        required: false
      timeout-minutes:
        description: >-
          Per-run guardrail, in minutes. Default (90) covers quick mode:
          quick runs stay single-pass (base once, head once) at this
          default; measured at ~5.6s/point x ~498 points x 2 captures (base,
          head) with criterion's default nresamples (100_000, pre-dating the
          BENCH_QUICK/nresamples fix below); nresamples(1000) cuts CPU-time
          ~61% but wall-clock savings depend on the runner's core count,
          which the 60-minute prior default didn't leave enough margin for.
          Point count is up from ~390 (+108, roughly +28%) since the
          BENCH-03 get_hit_rand/get_miss_rand benches were added (4x6+4x6 for
          cell_a, 5x6+5x6 for cell_b); re-check this estimate the next time
          bench point count grows materially.
          Full-precision callers (bench-compare-push.yml,
          bench-compare-comment.yml, bench-compare-dispatch.yml with
          quick=false) override this to 330 for the interleaved
          base/head/head/base run — four captures instead of quick's two
          (~2x the two-capture budget), capped 30 min under GitHub's
          360-minute hosted-runner ceiling (full precision is also ~9x
          slower per point: 100 samples/3s warm-up/5s measurement vs
          quick's 10/100ms/500ms). The same point-count growth applies to the
          full-precision run, so the margin under the ceiling is now
          materially thinner than when 330 was set — and 330 was already the
          last raise available under the 360-minute ceiling.
        type: number
        required: false
        default: 90

jobs:
  compare:
    runs-on: ubuntu-26.04
    timeout-minutes: ${{ inputs.timeout-minutes }}
    env:
      CARGO_TERM_COLOR: always
      BASE_REF: ${{ inputs.base-ref }}
      HEAD_REF: ${{ inputs.head-ref }}
      PR_NUMBER: ${{ inputs.pr-number }}
      # Read directly by benches/throughput.rs and benches/trie.rs, not by
      # Criterion's own CLI parsing — see the `quick` input's description above.
      BENCH_QUICK: ${{ inputs.quick && '1' || '' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # This is a public repo, so subsequent git fetch/checkout only ever need
          # anonymous read access — no reason to leave GITHUB_TOKEN sitting in the
          # local git credential helper for a (possibly fork-controlled) build/bench
          # step to find. The PR-comment write path goes through actions/github-script
          # (step below), which gets its own token independently of this credential.
          persist-credentials: false

      - name: Fetch PR head (fork-safe)
        if: inputs.pr-number != ''
        run: git fetch origin "refs/pull/$PR_NUMBER/head"

      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly

      - name: Install cargo-criterion
        run: cargo install --locked cargo-criterion

      # Build and stash xtask from this workflow's ref BEFORE the capture steps
      # check out other refs (see the file header). $RUNNER_TEMP is outside the
      # work tree, so the binary survives those checkouts, and building early
      # surfaces an xtask build failure before the long capture steps.
      - name: Build and stash xtask
        run: |
          cargo build --release -p xtask
          cp target/release/xtask "$RUNNER_TEMP/xtask"

      # No --all-features here (unlike ci.yml's `bench` smoke-test job): none of the
      # optional features (serde, serde_with, std) gate any bench code (no
      # `#[cfg(feature = ...)]` in benches/), so --all-features would only add compile
      # time, not comparison coverage. Matches the existing local `bench-export` recipe.
      #
      # Interleave base/head/head/base on one runner (FULL-PRECISION runs only)
      # so each ref's two captures straddle the run's midpoint symmetrically
      # (base at slots 1+4, head at slots 2+3 — both centroid at 2.5), which
      # cancels slow *linear* thermal/turbo drift in the base-vs-head
      # differential rather than merely sharing it — exact when the four captures
      # are evenly spaced in wall-clock time; the back-to-back head pair skips a
      # rebuild, a second-order asymmetry dwarfed by the multi-minute capture
      # cost. `xtask compare` averages the two captures per ref (point = mean,
      # interval = envelope). Quick PR runs
      # skip the second pair and stay single-pass. These capture steps still
      # invoke only cargo/cargo-criterion — never just/xtask — so they work at an
      # older base-ref that predates the repo-tracked tools.
      - name: Capture base
        run: |
          git checkout "$BASE_REF"
          cargo criterion -p arity-arrays --message-format=json > base1.json

      - name: Capture head
        run: |
          git checkout "$HEAD_REF"
          cargo criterion -p arity-arrays --message-format=json > head1.json

      - name: Capture head (interleave replicate)
        if: ${{ !inputs.quick }}
        run: |
          git checkout "$HEAD_REF"
          cargo criterion -p arity-arrays --message-format=json > head2.json

      - name: Capture base (interleave replicate)
        if: ${{ !inputs.quick }}
        run: |
          git checkout "$BASE_REF"
          cargo criterion -p arity-arrays --message-format=json > base2.json

      - name: Render comparison
        run: |
          if [ "${{ inputs.quick }}" = "true" ]; then
            HEAD_FILES=(head1.json)
            BASE_FILES=(base1.json)
          else
            HEAD_FILES=(head1.json head2.json)
            BASE_FILES=(base1.json base2.json)
          fi
          "$RUNNER_TEMP/xtask" compare --head "${HEAD_FILES[@]}" --base "${BASE_FILES[@]}" > compare.md
          if [ "${{ inputs.quick }}" = "true" ]; then
            { printf '> [!NOTE]\n> Quick mode: reduced sample count, single-pass A/B (no interleaving), noisier than a full run.\n\n'; cat compare.md; } > compare.md.tmp
            mv compare.md.tmp compare.md
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: bench-compare-${{ github.run_id }}
          path: |
            base1.json
            base2.json
            head1.json
            head2.json
            compare.md

      - name: Publish job summary
        run: cat compare.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment
        if: inputs.post-comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('compare.md', 'utf8');
            const marker = '<!-- bench-compare -->';
            const tagged = `${marker}\n${body}`;
            const prNumber = Number(process.env.PR_NUMBER);
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: tagged,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: tagged,
              });
            }
