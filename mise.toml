# Pinned developer tooling for local development (the `just` recipes).
#
# Install everything locally with `mise install` (or `just setup`).
# `cargo-binstall` is listed so the `cargo:` tools below install from prebuilt
# binaries — mise's `cargo.binstall` setting defaults on when cargo-binstall is
# on PATH — instead of compiling from source.
#
# CI does not use this manifest: it installs the Rust toolchains via
# dtolnay/rust-toolchain, and the one auxiliary tool it needs (cargo-fuzz) is
# installed from a prebuilt binary directly in the fuzz job.
[tools]
just = "latest"
cargo-binstall = "latest"
"cargo:cargo-nextest" = "latest"
"cargo:cargo-fuzz" = "latest"
"cargo:cargo-insta" = "latest"
